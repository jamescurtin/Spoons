repos:
  - repo: local
    hooks:
      - id: publish
        name: Publish docs and zipped spoons
        entry: bin/publish.sh
        language: system
        # The hook builds shared output dirs (.docs_tmp, docs, Spoons) and
        # ignores its filename args. Without pass_filenames: false, pre-commit
        # splits --all-files into batches and runs the hook concurrently, and
        # those parallel runs race on those dirs (FileExistsError in build_docs).
        pass_filenames: false
        always_run: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '^docs\/|docs\.json$'
      - id: check-yaml
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-shebang-scripts-are-executable
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ["-x"]
  - repo: https://github.com/openstack/bashate/
    rev: 2.1.1
    hooks:
      - id: bashate
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos
        exclude: '^docs\/|docs\.json$'
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.5.2
    hooks:
      - id: stylua-github
  - repo: https://github.com/mrtazz/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
